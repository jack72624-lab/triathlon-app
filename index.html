<!DOCTYPE html>
<html lang="zh-Hant">
<!--
  Tri Plan — 三鐵打卡 PWA（正式版）。單檔：vanilla JS + Firebase compat（Google 登入 + Firestore 同步）。
  狀態 checks/bonus/weekMode/sessionAdj/suggestions 存 localStorage 快取 + 防抖寫 Firestore；未填 config 退本機預覽。
  天氣走 Open-Meteo 客端。部署：firebase deploy → tri-jack72624-91e31.web.app（GitHub: jack72624-lab/triathlon-app）。
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tri Plan</title>
<meta name="theme-color" content="#161b26">
<link rel="icon" type="image/png" sizes="32x32" href="icon/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon/icon-16.png">
<link rel="apple-touch-icon" href="icon/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tri Plan">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15171c; --sub:#6b7280; --faint:#767d8b; --hint:#9aa0ab;
  --bg:#f6f7f9; --card:#fff; --border:#e9ebef; --line:#eef0f3; --line2:#f2f3f6;
  --nav:#161b26;
  --key:#516a8f; --keep:#5e827b; --flex:#7b8494;
  --key-t:#eef1f5; --keep-t:#eef2f0; --flex-t:#eef0f3; --rest-t:#f1f2f5;
  --done:#4f9b74; --bonus:#c2913f; --miss:#c4685f; --strava:#fc5200;
  --warn:#a6772e; --warn-t:#faf4e8; --warn-b:#ecdfc4;
  --r:20px; --sh:0 4px 22px rgba(20,22,30,.05);
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:"Manrope","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink)}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit}

/* ---------- Auth ---------- */
#auth{position:fixed;inset:0;background:radial-gradient(120% 80% at 50% 0%,#222a3a 0%,#161b26 55%,#0f131c 100%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(60px + var(--safe-top)) 32px calc(40px + var(--safe-bot));transition:opacity .4s}
#auth.gone{opacity:0;pointer-events:none}
.mode-pill{font-size:10px;color:#9fb3d6;background:rgba(120,150,200,.12);border:1px solid rgba(120,150,200,.22);padding:4px 11px;border-radius:99px;margin-bottom:22px;letter-spacing:.05em}
.auth-icon{width:66px;height:66px;background:rgba(255,255,255,.06);border-radius:18px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.auth-title{font-size:27px;font-weight:800;color:#f3f4f7;letter-spacing:-.5px;margin-bottom:9px}
.auth-sub{font-size:13.5px;color:#9aa3b4;text-align:center;line-height:1.65;margin-bottom:46px;max-width:280px}
.btn-google{display:flex;align-items:center;gap:12px;background:#f3f4f7;color:#161b26;border:none;border-radius:14px;padding:15px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:300px;justify-content:center;box-shadow:0 6px 24px rgba(0,0,0,.3);transition:transform .12s}
.btn-google:active{transform:scale(.97)}
.auth-note{font-size:11px;color:#6b7588;text-align:center;margin-top:22px;line-height:1.6;max-width:290px}
.auth-spin{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.15);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .8s linear infinite;display:none}
#auth.loading .auth-spin{display:block} #auth.loading>:not(.auth-spin){display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Shell + nav ---------- */
#shell{display:none;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#shell.on{display:flex}
.nav{background:var(--nav);padding:20px 18px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
.nav-left{display:flex;align-items:center;gap:11px}
.nav-icon{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.nav-title{font-size:15px;font-weight:800;color:#f3f4f7;letter-spacing:.2px}
.nav-sub{font-size:10px;color:#8b93a3;margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:#7a9c8c;background:rgba(111,184,154,.12);border:1px solid rgba(111,184,154,.2);padding:4px 9px;border-radius:6px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.sync-badge.syncing{color:#aeb6c2;background:rgba(174,182,194,.12);border-color:rgba(174,182,194,.2)}
.sync-badge.offline{color:#c08aa0;background:rgba(192,138,160,.12);border-color:rgba(192,138,160,.2)}
.sync-badge.syncing .sync-dot{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}
.user-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#dfe3ea;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
#user-menu{position:absolute;top:calc(100% + 8px);right:14px;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.22);z-index:50;overflow:hidden;opacity:0;transform:scale(.95) translateY(-6px);transform-origin:top right;pointer-events:none;transition:.18s}
#user-menu.open{opacity:1;transform:none;pointer-events:auto}
.menu-u{padding:14px 16px;border-bottom:1px solid var(--line)}
.menu-name{font-size:14px;font-weight:700}
.menu-email{font-size:11px;color:var(--sub);margin-top:2px;word-break:break-all}
.menu-item{padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer}
.menu-item:active{background:var(--bg)}
.scroll{flex:1;overflow-y:auto;padding:16px 16px calc(76px + var(--safe-bot));-webkit-overflow-scrolling:touch}

/* ---------- Segmented ---------- */
/* ---------- 底部分頁（docked 貼底列，沿用「收入分配」tabbar：圖示+標籤，active 變亮+放大+小點）---------- */
.tnav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;background:var(--nav);border-top:1px solid rgba(255,255,255,.07);padding-bottom:var(--safe-bot)}
.tnav-btn{flex:1;padding:10px 0 8px;border:none;background:none;color:#8b93a3;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;font-family:inherit}
.tnav-btn svg{width:18px;height:18px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tnav-btn.on{color:#f3f4f7}
.tnav-btn.on svg{transform:scale(1.12)}
.tnav-dot{width:4px;height:4px;border-radius:2px;background:currentColor;opacity:0;transform:scaleX(0);transition:opacity .2s,transform .25s cubic-bezier(.34,1.56,.64,1);margin-top:-1px}
.tnav-btn.on .tnav-dot{opacity:1;transform:scaleX(1)}
@media (prefers-reduced-motion:reduce){.tnav-btn svg,.tnav-dot{transition:none}}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.sec{display:flex;align-items:center;gap:8px;margin:22px 2px 10px}
.sec span{font-size:10px;font-weight:800;color:var(--faint);letter-spacing:.12em;text-transform:uppercase}
.sec .ln{flex:1;height:1px;background:var(--border)}

/* hero */
.hero{padding:2px 20px 16px;margin-bottom:14px}
.hero-row{display:flex;align-items:center;gap:12px}
.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-c{transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)}
.ring-t{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-weight:800;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.ring-sub{font-size:10px;color:var(--faint);font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.hero-ey{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.hero-h{font-size:18px;font-weight:800;color:var(--ink);margin-top:5px;letter-spacing:-.3px}
.hero-m{font-size:12px;color:var(--sub);margin-top:3px}
.dots{display:flex;gap:6px;margin-top:14px}
.dots i{width:9px;height:9px;border-radius:99px;display:block}
.dots-side{margin-top:0;margin-right:10px;align-self:center;flex-shrink:0;gap:4px}
.dots-side i{width:7px;height:7px}

/* day list */
.daylist{overflow:hidden}
.dayhead{display:flex;align-items:center;gap:10px;padding:15px 16px 7px}
.dayhead.bt{border-top:1px solid var(--line2)}
.dayhead b{font-size:10px;font-weight:800;letter-spacing:.12em}
.dayhead .ln{flex:1;height:1px;background:var(--line)}
.dayhead .rt{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint)}
.wxchip{display:flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;font-variant-numeric:tabular-nums}
/* Claude 建議卡 */
.sug{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line)}
.sug:last-child{border-bottom:none}
.sug-b{flex:1;min-width:0}
.sug-t{font-size:13.5px;font-weight:700;color:var(--ink)}
.sug-r{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5}
.sug-act{display:flex;gap:6px;flex-shrink:0;align-self:center}
.sug-act button{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub)}
.sug-act .sug-yes{background:var(--key);color:#fff;border:none}
.sess{display:flex;align-items:center;gap:13px;padding:9px 16px;cursor:pointer}
.sess:last-child{padding-bottom:14px}
.sqr{flex:0 0 36px;width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.sbody{flex:1;min-width:0}
.stitle{font-weight:600;font-size:14px;color:var(--ink)}
.stitle.done{color:var(--faint);text-decoration:line-through;text-decoration-color:#d6d9e0}
.stitle.skip{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--hint)}
.sess-rest .stitle{font-weight:500;color:var(--faint)}
.tags{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.tag{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.sdetail{flex:0 0 auto;width:22px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--hint);cursor:pointer}
.sdetail svg{width:16px;height:16px}
.chk{flex:0 0 26px;width:26px;height:26px;border-radius:99px;border:1.5px solid #d8dbe2;background:#fff;display:flex;align-items:center;justify-content:center;transition:transform .1s;position:relative}
.chk.on{background:var(--done);border-color:var(--done)}
.sess:active .chk{transform:scale(.86)}

/* ---------- 打卡完成回饋（情感化設計 · 點 1）---------- */
/* 勾勾描繪：完成瞬間讓既有的白勾從無到有畫出來 */
.chk.pop svg path{stroke-dasharray:22;stroke-dashoffset:22;animation:tickdraw .4s .04s cubic-bezier(.65,0,.35,1) forwards}
@keyframes tickdraw{to{stroke-dashoffset:0}}
/* 整顆 checkbox 輕彈一下（overshoot 回正）*/
.chk.pop{animation:chkpop .42s cubic-bezier(.34,1.56,.64,1)}
@keyframes chkpop{0%{transform:scale(.7)}45%{transform:scale(1.2)}100%{transform:scale(1)}}
/* 擴散光環：往外擴一圈淡出；跑步項會再疊一圈較亮的 .r2 */
.ringfx{position:absolute;inset:0;border-radius:50%;border:2.5px solid var(--done);opacity:0;pointer-events:none;animation:ringburst .55s ease-out forwards}
.ringfx.r2{border-color:#7bc4a0;animation:ringburst .6s .12s ease-out forwards}
@keyframes ringburst{0%{opacity:.85;transform:scale(.7)}100%{opacity:0;transform:scale(2.1)}}
/* 跑步完成的鼓勵浮字（弱項 → 額外正回饋）*/
.cheer{position:fixed;left:50%;bottom:calc(42px + var(--safe-bot));transform:translate(-50%,16px);background:var(--nav);color:#f3f4f7;font-size:13px;font-weight:700;padding:11px 18px;border-radius:13px;box-shadow:0 10px 34px rgba(0,0,0,.28);opacity:0;z-index:150;pointer-events:none;transition:opacity .3s,transform .3s cubic-bezier(.3,.9,.3,1);max-width:78vw;text-align:center;line-height:1.5}
.cheer.show{opacity:1;transform:translate(-50%,0)}
@media (prefers-reduced-motion:reduce){.chk.pop,.chk.pop svg path,.ringfx,.ringfx.r2{animation:none}.chk.pop svg path{stroke-dashoffset:0}}

/* strava */
.sv-sum{display:flex;border-bottom:1px solid var(--line)}
.sv-sum>div{flex:1;padding:13px 0;text-align:center}
.sv-sum>div+div{border-left:1px solid var(--line)}
.sv-n{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.sv-l{font-size:9.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.act{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.act:last-child{border-bottom:none}
.act-b{flex:1;min-width:0}
.act-t{font-weight:600;font-size:13.5px;color:var(--ink)}
.act-s{font-size:11px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums}
.act-st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:6px;flex-shrink:0;align-self:center}
.st-match{color:var(--done);background:#e9f7f0} .st-bonus{color:var(--bonus);background:#fdf3e3}
.bonus-act{display:flex;gap:7px;margin-top:9px}
.bonus-act button{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub)}
.bonus-act .b-yes{background:var(--nav);color:#fff;border:none}
.empty{padding:18px 16px;font-size:12.5px;color:var(--faint);text-align:center}

/* legend / overview */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:14px 4px 0;font-size:11px;color:var(--faint)}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
.ovcap{font-size:12px;color:var(--sub);margin:2px 4px 14px;line-height:1.55}
.ovrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid var(--line);cursor:pointer}
.ovrow:first-child{border-top:none}
.ovrow.rec{background:#eef1f5}
.ovnum{flex:0 0 32px;text-align:center;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.ovmid{flex:1;min-width:0}
.ovchips{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:5px}
.chip-build{color:var(--key);background:var(--key-t)} .chip-rec{color:var(--flex);background:#e3e7ee}
.chip-trip{display:flex;align-items:center;gap:3px;color:var(--key);background:#e0e6ef}
.chip-boost{display:flex;align-items:center;gap:3px;color:var(--key);background:#e0e6ef}
.ovdate{font-size:11px;color:var(--faint);margin-top:6px}
.ovbar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:9px}
.ovbar i{display:block;height:100%;background:var(--done);border-radius:99px}
.ovdone{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--sub);font-variant-numeric:tabular-nums;margin-right:2px}
.ovdone b{color:var(--done)}
.ovpin{flex:0 0 30px;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ovpin.on{background:var(--key)}
.foot{text-align:center;font-size:11px;color:var(--hint);margin-top:20px;line-height:1.7}
.foot .wsim{margin-top:10px;display:inline-flex;gap:2px;background:#e9ebef;padding:3px;border-radius:9px}
.foot .wsim button{border:none;background:none;padding:6px 11px;font-size:11px;font-weight:700;color:var(--sub);border-radius:6px;cursor:pointer}
.foot .wsim button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(20,22,30,.08)}

/* ---------- 進度卡（情感化設計 · 點 2/3/4：倒數 + streak + 分項進度 + 數字滾動）---------- */
.prog{padding:18px 18px 16px;margin-bottom:14px}
.prog-cd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cd-n{font-size:34px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-1px}
.cd-n i{font-size:15px;font-weight:700;color:var(--faint);font-style:normal;margin-left:3px}
.cd-l{font-size:11px;color:var(--sub);margin-top:6px;font-weight:600}
.prog-streak{text-align:right;flex-shrink:0}
.streak-n{display:inline-flex;align-items:center;gap:4px;font-size:22px;font-weight:800;color:var(--bonus);line-height:1}
.streak-l{font-size:10px;color:var(--faint);font-weight:700;margin-top:5px;letter-spacing:.04em}
.disc-row{display:flex;gap:10px;margin:16px 0 2px}
.disc{flex:1}
.disc-h{display:flex;align-items:center;gap:4px;font-size:15px;font-weight:800;color:var(--ink)}
.disc-h span{color:var(--faint);font-weight:700;font-size:12px}
.disc-bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:7px 0 5px}
.disc-bar i{display:block;height:100%;background:var(--key);border-radius:99px}
.disc-l{font-size:10px;color:var(--faint);font-weight:700}
.stat-trio{display:flex;border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.stat-trio>div{flex:1;text-align:center}
.stat-trio>div+div{border-left:1px solid var(--line)}
.stat-trio b{display:block;font-size:17px;font-weight:800;color:var(--ink)}
.stat-trio b i{font-size:11px;color:var(--faint);font-style:normal;font-weight:700;margin-left:1px}
.stat-trio span{font-size:9.5px;color:var(--faint);font-weight:700;margin-top:3px;display:block}
.cup{font-variant-numeric:tabular-nums}
/* 卡片進場（情感化設計 · 點 5：逐張淡入上浮，一次性；切換週/分頁才播）*/
.intro-card{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.intro-card{animation:none}}

/* banners */
.banner{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:16px;margin-bottom:14px}
.banner-dark{background:var(--nav)}
.banner-dark .b-ic{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.banner-dark .b-t{font-size:13px;font-weight:700;color:#f3f4f7}
.banner-dark .b-s{font-size:10.5px;color:#8b93a3;margin-top:1px}
.banner-act{font-size:11px;font-weight:700;color:#cdd3dd;background:rgba(255,255,255,.1);padding:7px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
.banner-rain{background:#2b3346}
.banner-rain .b-ic{background:rgba(255,255,255,.08)} .banner-rain .b-t{color:#f3f4f7} .banner-rain .b-s{color:#9aa3b4}
.banner-rain .banner-act{color:#1a1f2b;background:#cdd8ec}
.banner-warn{flex-direction:column;align-items:stretch;background:var(--warn-t);border:1px solid var(--warn-b)}
.banner-warn .wh{display:flex;align-items:center;gap:12px}
.banner-warn .b-ic{width:34px;height:34px;border-radius:10px;background:#f3e6cc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.banner-warn .b-t{font-size:13px;font-weight:800;color:#7a5618}
.banner-warn .b-s{font-size:10.5px;color:#9c8048;margin-top:1px}

const firebaseConfig = {

/* ============================================================
   原始資料與邏輯（不更動）— W / DATE / SAMPLE_ACTS / sessionsOf / matchWeek …
   ============================================================ */
const T={core:'Key',keep:'Keep',flex:'Flex',rest:'Rest'};
const W={
 1:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 4k easy · strides','core'],['Bike 1:00 Z2','keep'],['Run 4k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 1:30 + Brick run 10m','core'],['Long run 8k','core']]},
 2:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 5k easy · strides','core'],['FTP/ramp test','keep','test'],['Run 5k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 1:45 + Brick run 10m','core'],['Long run 9k','core']]},
 3:{type:'Recovery',d:[['Swim 0:40 + Strength 30–45m','keep'],['Run 4k easy · strides','core'],['Bike 0:50 Z2','keep'],['Run 4k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 1:30 + Brick run 10m','core'],['Long run 7k','core']]},
 4:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['5k time trial','core','test'],['Bike 1:00 Z2','keep'],['Run 6k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:00 + Brick run 12m','core'],['Long run 10k','core']]},
 5:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 6k easy · strides','core'],['Bike 1:00 Z2','keep'],['Run 6k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:00 + Brick run 15m','core'],['Long run 11k','core']]},
 6:{type:'Recovery',d:[['Swim 0:40 + Strength 30–45m','keep'],['Run 5k easy · strides','core'],['Bike 0:50 Z2','keep'],['Run 5k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 1:45 + Brick run 12m','core'],['Long run 9k','core']]},
 7:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 6k easy · strides','core'],['Bike 1:10 Z2','keep'],['Run 7k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:15 + Brick run 15m','core'],['Long run 12k','core']]},
 8:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 7k easy · strides','core'],['Bike 1:10 Z2','keep'],['Run 7k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:15 + Brick run 18m','core'],['Long run 13k','core']]},
 9:{type:'Recovery',d:[['Swim 0:40 + Strength 30–45m','keep'],['Run 5k easy · strides','core'],['Bike 1:00 Z2','keep'],['Run 6k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:00 + Brick run 12m','core'],['Long run 10k','core']]},
 10:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 7k easy · strides','core'],['Bike 1:15 Z2','keep'],['Run 8k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:30 + Brick run 18m','core'],['Long run 13k','core']]},
 11:{type:'Build',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 7k easy · strides','core'],['Bike 1:15 Z2','keep'],['Run 8k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:30 + Brick run 20m','core'],['Long run 14k','core']]},
 12:{type:'Recovery',d:[['Swim 0:45 + Strength 30–45m','keep'],['Run 6k easy · strides','core'],['Bike 1:00 Z2','keep'],['Run 6k easy + Strength 30–45m','core'],['Rest + Calf release','rest'],['Long bike 2:00 + Brick run 15m','core'],['Long run 11k','core']]},
};
const DATE={1:'Jun 29–Jul 5',2:'Jul 6–12',3:'Jul 13–19',4:'Jul 20–26',5:'Jul 27–Aug 2',6:'Aug 3–9',7:'Aug 10–16',8:'Aug 17–23',9:'Aug 24–30',10:'Aug 31–Sep 6',11:'Sep 7–13',12:'Sep 14–20'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYZH=['一','二','三','四','五','六','日'];
const WK_START=new Date('2026-06-29T00:00:00');

const SAMPLE_ACTS=[
 {id:'s1',date:'2026-06-30',type:'Run',distance_km:5.2,moving_time_s:1930,avg_hr:145},
 {id:'s2',date:'2026-07-02',type:'Run',distance_km:7.0,moving_time_s:2550,avg_hr:148},
 {id:'s3',date:'2026-07-05',type:'Run',distance_km:8.3,moving_time_s:3120,avg_hr:150},
 {id:'s4',date:'2026-07-05',type:'Run',distance_km:3.1,moving_time_s:1180,avg_hr:138},
 {id:'s5',date:'2026-07-04',type:'Ride',distance_km:46,moving_time_s:6720,avg_watts:168},
];
// 雲端模式下由 Firestore 子集合填入；本機預覽用 sample。
let acts = CLOUD ? [] : SAMPLE_ACTS.slice();

/* ---- 狀態：本機 localStorage 當離線快取，登入後由 Firestore 文件覆蓋為真實來源 ---- */
const LS=(k,def)=>{try{return JSON.parse(localStorage.getItem(k))??def}catch(e){return def}};
let checks=LS('tp_checks',{});
let bonus=LS('tp_bonus',{});
let weekMode=LS('tp_weekMode',{});   // {5:{mode:'recovery',tpl:'travel',dest:'高雄'}, 6:{mode:'build'}}
let sessionAdj=LS('tp_adj',{});      // {'1_2_0':{indoor:1}} / {move:{label,to}} / {skip:1}
let suggestions=LS('tp_sug',[]);     // Claude 週回顧建議卡（weekly-review 寫進 tri_users.suggestions）

let cur=1, mode='week', currentUser=null;
let _unsubDoc=null,_unsubActs=null,_recentWrite=false,_pushTimer=null;
const $=s=>document.querySelector(s);

function saveLocal(){localStorage.setItem('tp_checks',JSON.stringify(checks));localStorage.setItem('tp_bonus',JSON.stringify(bonus));localStorage.setItem('tp_weekMode',JSON.stringify(weekMode));localStorage.setItem('tp_adj',JSON.stringify(sessionAdj));localStorage.setItem('tp_sug',JSON.stringify(suggestions));}
// push()：所有打卡/調整動作都呼叫它 → 立刻存本機 + 防抖 600ms 寫雲端（含新功能 weekMode/sessionAdj）。
function push(){
  saveLocal();
  if(!CLOUD||!currentUser)return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(async()=>{setSync('syncing');_recentWrite=true;
    try{await db.collection('tri_users').doc(currentUser.uid).set({checks,bonus,weekMode,sessionAdj,suggestions,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});setSync('synced');}
    catch{_recentWrite=false;setSync('offline');}
    setTimeout(()=>{_recentWrite=false;},1500);
  },600);
}

function sessionsOf(dayIdx,day){
  const lv=day[1];
  return day[0].split(' + ').map((p,i)=>{
    p=p.trim(); let l=lv, rest=false;
    if(p==='Rest') rest=true;
    else if(/Calf/.test(p)) l='flex';
    else if(/Strength/.test(p)) l='keep';
    else if(/Brick/.test(p)) l='core';
    else if(i>0) l='keep';
    return {t:p,lv:l,rest,test:i===0&&day[2]==='test'};
  });
}
function discOf(text){const t=text.toLowerCase();if(t.includes('swim'))return'swim';if(t.includes('bike')||t.includes('ftp')||t.includes('ramp'))return'ride';if(t.includes('run')||t.includes('time trial'))return'run';return null;}
function poolOf(w){const p={run:0,ride:0,swim:0};planOf(w).d.forEach(d=>{const k=discOf(d[0]);if(k)p[k]++;});return p;}
function weekOf(dateStr){const d=new Date(dateStr+'T00:00:00');return Math.floor((d-WK_START)/(7*864e5))+1;}
function typeToDisc(t){return t==='Run'?'run':(t==='Ride'||t==='VirtualRide')?'ride':t==='Swim'?'swim':null;}
function matchWeek(w){
  const list=acts.filter(a=>weekOf(a.date)===w);
  const pool=poolOf(w),used={run:0,ride:0,swim:0};
  const out=list.map(a=>{const k=typeToDisc(a.type);let st='bonus';if(k&&used[k]<pool[k]){used[k]++;st='match';}return {...a,status:st};});
  const miss={run:pool.run-used.run,ride:pool.ride-used.ride,swim:pool.swim-used.swim};
  return {out,miss};
}

/* ============================================================
   附加層 1 — 移動週 / 成對加量（planOf / weekMode）
   ============================================================ */
const RECOVERY_TPL=W[3].d;   // 原減量課表
const BUILD_TPL=W[5].d;      // 加量（正常訓練）課表
const TRIP_TRAVEL=[          // 旅行特化版：到哪都能做、全 Flex
 ['Strength 30m','flex'],['Run 4k easy','flex'],['Rest','rest'],
 ['Run 4k easy','flex'],['Rest + Calf release','rest'],['Run 6k easy','flex'],['Rest','rest']
];
function planOf(w){
  const m=weekMode[w];
  if(!m) return Object.assign({trip:false,boosted:false},W[w]);
  if(m.mode==='recovery'){
    const isTravel = m.tpl!=='orig';                                  // orig=在家減量(非 trip)；travel=旅行特化(trip)
    const d = isTravel ? TRIP_TRAVEL : RECOVERY_TPL;
    return {type:'Recovery',trip:isTravel,deloaded:!isTravel,dest:m.dest||'',tplName:(isTravel?'旅行特化':'原減量課表'),d};
  }
  if(m.mode==='build') return {type:'Build',boosted:true,d:BUILD_TPL};
  return Object.assign({trip:false},W[w]);
}
window.setWeekMode=(w,mode,opt)=>{
  if(!mode){ delete weekMode[w]; }
  else if(mode==='recovery'){ weekMode[w]={mode:'recovery',tpl:(opt&&opt.tpl)||'travel',dest:(opt&&opt.dest)||''}; }
  else if(mode==='build'){ weekMode[w]={mode:'build'}; }
  push(); closeSheet(); render();
};

/* ============================================================
   附加層 2 — 單堂課調整（換天 / 室內 / 略過）
   ============================================================ */
function effectiveSessions(w,di){
  const day=planOf(w).d[di];
  const base=sessionsOf(di,day);
  return base.map((s,si)=>{
    const a=sessionAdj[w+'_'+di+'_'+si]||{};
    s.done=!!checks[w+'_'+di+'_'+si];
    s.indoor=!!a.indoor; s.skip=!!a.skip; s.move=a.move||null;
    return s;
  });

window.adjSkip=(di,si)=>{const k=cur+'_'+di+'_'+si;const a=sessionAdj[k]||{};a.skip=!a.skip;sessionAdj[k]=a;push();closeSheet();render();};

/* ============================================================

   抓新北+高雄兩地 7 天逐日預報，每個日期依「那天所在週是否去高雄」挑城市。
   用途：①今天 banner（一鍵調整今天）②每日預報小標 ③週末關鍵課對調建議。
   ============================================================ */
const TRIP_CITY='高雄市', TRIP_COORD=[22.631,120.302];   // 高雄市區（高雄週固定抓這）
let HOME_LABEL='新北市', HOME_COORD=[25.012,121.465];    // 「在地」預設新北；取得裝置定位後改成你實際所在地
const _cachedGeo=LS('tp_geo',null); if(_cachedGeo&&_cachedGeo.length===2){ HOME_COORD=_cachedGeo; HOME_LABEL='目前位置'; }  // 沿用上次定位，不重新請求權限
let weatherByDate={};   // {'YYYY-MM-DD':{level,pop,code,wind,city}}
let _wxRaw=null;        // 兩地原始 daily（換城市時免重抓、重算即可）
let wxOverride=null;    // 手動覆寫「今天」（'clear'|'rain'|'typhoon'|null），僅本次工作階段
let wxDismissed=null;   // 今天的天氣 banner 已「自動處理/收起」（存 todayStr），本次工作階段隱藏

function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }  // 本地日期，避免 toISOString 的 UTC 位移
function dateOf(w,di){ return ymd(new Date(WK_START.getTime()+((w-1)*7+di)*864e5)); }
function todayStr(){ return ymd(new Date()); }
function todayWeek(){ const w=weekOf(todayStr()); return (w>=1&&w<=12)?w:null; }   // 今天落第幾週（課表外=null）
function todayIdx(){ return (new Date().getDay()+6)%7; }                            // 今天星期幾（一=0）
function cityForWeek(w){ const m=weekMode[w]; return (m&&m.mode==='recovery'&&/高雄/.test(m.dest||''))?'trip':'home'; }  // 高雄週固定高雄；其餘＝在地（裝置定位或新北）

const WMO_TXT={0:'晴',1:'晴時多雲',2:'多雲',3:'陰',45:'霧',48:'霧',51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',56:'凍雨',57:'凍雨',61:'小雨',63:'雨',65:'大雨',66:'凍雨',67:'凍雨',71:'雪',73:'雪',75:'大雪',77:'雪珠',80:'陣雨',81:'陣雨',82:'強陣雨',85:'陣雪',86:'陣雪',95:'雷雨',96:'雷雨夾雹',99:'雷雨夾雹'};

function levelFromForecast(pop,code,wind){
  if(wind>=60) return 'typhoon';                  // 強風（颱風/熱帶風暴等級）→ 不安全
  if([95,96,99].includes(code)) return 'rain';    // 雷雨
  if(pop>=50) return 'rain';
  if([65,67,82,86].includes(code)) return 'rain'; // 大雨/強陣雨

function fxOf(w,di){ return weatherByDate[dateOf(w,di)]||null; }     // 某課表日的預報（超 7 天或還沒抓=null）
function todayLevel(){ if(wxOverride) return wxOverride; const f=weatherByDate[todayStr()]; return f?f.level:'clear'; }

// 從兩地原始資料，依每個日期所在週的城市，重算 weatherByDate（render 時呼叫，免重抓）
function resolveWeather(){
  if(!_wxRaw) return;
  const times=_wxRaw.home.time, m={};
  times.forEach((dt,i)=>{
    const key=cityForWeek(weekOf(dt)), d=_wxRaw[key];
    const pop=d.precipitation_probability_max[i], code=d.weather_code[i], wind=d.wind_speed_10m_max[i];
    m[dt]={ pop, code, wind, city:(key==='trip'?TRIP_CITY:HOME_LABEL), level:levelFromForecast(pop,code,wind) };
  });

}
// 取得裝置位置（只問一次）→ 更新「在地」座標與標籤；拒絕/失敗/逾時 → 維持新北
async function fetchWeather(){
  try{
    const grab=async cc=>{
      const u=`https://api.open-meteo.com/v1/forecast?latitude=${cc[0]}&longitude=${cc[1]}&daily=precipitation_probability_max,weather_code,wind_speed_10m_max&timezone=auto&forecast_days=7`;
      return (await (await fetch(u)).json()).daily;
    };
    const [home,trip]=await Promise.all([grab(HOME_COORD), grab(TRIP_COORD)]);

// 定位改成「使用者主動點」才抓（iOS 主畫面 PWA 權限不跨啟動記憶，自動抓會每次問）；座標存本機沿用

    ()=>alert('拿不到定位 — 可能要到 iPhone 設定允許「位置」權限'),

};

// 今天的一鍵調整：依今天天氣改今天的課
window.autoWeather=()=>{
  const w=todayWeek(); if(w==null) return; const di=todayIdx(); const lv=todayLevel(); let n=0;
  sessionsOf(di,planOf(w).d[di]).forEach((s,si)=>{
    if(s.rest) return;
    const disc=discOf(s.t); const k=w+'_'+di+'_'+si; const a=sessionAdj[k]||{};
    if(lv==='typhoon'){ if(disc==='ride'){a.indoor=1;n++;} else {a.skip=1;n++;} }                                   // 颱風：踩台留、其餘略過
    else if(lv==='rain'){ if(disc==='ride'){a.indoor=1;n++;} else if(disc==='run'){a.move={to:Math.min(6,di+1),label:DAYS[Math.min(6,di+1)],swap:false};n++;} }  // 雨：單車踩台、跑步換隔天、游泳不動
    sessionAdj[k]=a;

};

// 週末關鍵課對調建議：比較週六(長騎+磚)/週日(長跑)的預報
function weekendAdvice(w){
  const sat=fxOf(w,5), sun=fxOf(w,6);
  if(!sat||!sun) return null;                       // 還沒到 7 天預報範圍
  const bad=l=>l==='rain'||l==='typhoon';
  if(bad(sat.level)&&!bad(sun.level)) return `週六長騎 ${wxText(sat.code)}${sat.pop!=null?` ${sat.pop}%`:''}，週日較佳 → 建議與週日長跑對調`;
  if(bad(sun.level)&&!bad(sat.level)) return `週日長跑 ${wxText(sun.code)}${sun.pop!=null?` ${sun.pop}%`:''}，週六較佳 → 建議與週六長騎對調`;
  if(bad(sat.level)&&bad(sun.level)) return `週末兩天都可能有雨（六 ${sat.pop??'?'}% / 日 ${sun.pop??'?'}%）→ 長課考慮室內或彈性安排`;
  return null;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }  // 進 innerHTML 前跳脫（reason/dest 是雲端/Claude 來源）
function sugTitle(s){

  const lbl={move:`換到週${DAYZH[s.to]}`,swap:`與週${DAYZH[s.to]}互換`,indoor:'改室內',skip:'略過'}[s.action]||'';
  return `${what} → ${lbl}`;
}
function sugCard(s){
  const apply=s.action!=='note'&&s.dayIdx>=0;
  return `<div class="sug"><div class="sug-b"><div class="sug-t">${sugTitle(s)}</div><div class="sug-r">${esc(s.reason)}</div></div><div class="sug-act">${apply?`<button class="sug-yes" onclick="acceptSug('${s.id}')">接受</button><button onclick="dismissSug('${s.id}')">略過</button>`:`<button class="sug-yes" onclick="dismissSug('${s.id}')">知道了</button>`}</div></div>`;
}
window.acceptSug=id=>{
  const s=suggestions.find(x=>x.id===id); if(!s) return;
  if(s.action!=='note'&&s.dayIdx>=0){
    const k=s.week+'_'+s.dayIdx+'_'+s.sessionIdx; const a=sessionAdj[k]||{};
    if(s.action==='move') a.move={to:s.to,label:DAYS[s.to],swap:false};
    else if(s.action==='swap') a.move={to:s.to,label:DAYS[s.to],swap:true};

/* ============================================================
   情感化設計 · 進度層（點 2/3/4）— 倒數、streak、分項進度、本週/本月量、數字滾動。
   全部由現有狀態（checks / acts / W）即時算出，不新增儲存欄位。

let _vKey=null, _introOn=false;          // _introOn：本次 render 是否要播放進場＋數字滾動（只在切換週/分頁時 true）
const RACE=new Date('2027-04-24T00:00:00');
function daysToRace(){ return Math.max(0,Math.ceil((RACE-new Date())/864e5)); }
// 某日狀態：done=當天有練到任一堂 / free=只剩休息或伸展(橋接、不斷鏈) / miss=該練沒練 / null=計畫外
function dayState(dateStr){
  const w=weekOf(dateStr); if(w<1||w>12) return null;
  const di=(new Date(dateStr+'T00:00:00').getDay()+6)%7;
  const sess=effectiveSessions(w,di).filter(s=>!s.rest&&!s.skip);
  if(sess.some(s=>s.done)) return 'done';
  if(sess.every(s=>s.lv==='flex')) return 'free';   // 只有伸展/全休 → 不算斷
  return 'miss';
}
// 連續訓練天數：從今天往回數（今天還沒練不算斷），休息/伸展日橋接、漏練才中斷
function currentStreak(){
  let n=0, d=new Date();
  if(dayState(ymd(d))!=='done') d.setDate(d.getDate()-1);
  for(let i=0;i<160;i++){
    const st=dayState(ymd(d));
    if(st==='done'){ n++; d.setDate(d.getDate()-1); }
    else if(st==='free'){ d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}
// 本週分項：以「每天的主課別」(day[0]) 計數，與 Strava 對應/poolOf 同一套口徑
function weekDiscProgress(w){
  const plan=planOf(w), done={swim:0,ride:0,run:0}, pl={swim:0,ride:0,run:0};
  plan.d.forEach((day,di)=>{
    const k=discOf(day[0]); if(!k) return; pl[k]++;
    const s0=effectiveSessions(w,di)[0];
    if(s0&&s0.done&&!s0.skip) done[k]++;
  });
  return {done,plan:pl};
}
function weekVolume(w){ let s=0,km=0; acts.forEach(a=>{ if(weekOf(a.date)===w){ s+=a.moving_time_s||0; km+=a.distance_km||0; } }); return {hours:s/3600,km}; }
function monthMileage(){ const now=new Date(),y=now.getFullYear(),m=now.getMonth(); let km=0; acts.forEach(a=>{ const dt=new Date(a.date+'T00:00:00'); if(dt.getFullYear()===y&&dt.getMonth()===m&&dt>=WK_START){ const k=typeToDisc(a.type); if(k==='run'||k==='ride') km+=a.distance_km||0; } }); return km; }  // 只算計畫開始(6/29)後

// 數字滾動：0 → 目標（ease-out cubic）。尊重「減少動態」設定。
function countUp(el,to,o){
  o=o||{}; const dec=o.dec||0, suf=o.suf||'', pre=o.pre||'', from=o.from||0;
  const fmt=v=>pre+(+v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
  if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches){ el.textContent=fmt(to); return; }
  const t0=performance.now(), dur=o.dur||850;
  (function step(t){ const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3); el.textContent=fmt(from+(to-from)*e); if(k<1) requestAnimationFrame(step); else el.textContent=fmt(to); })(t0);
}
// 打卡完成時：圓環(%／done／弧線)與分項(數字／長條)從「舊值」滑到「新值」，不瞬間跳。
function snapProgress(){ const t=totals(cur), dp=weekDiscProgress(cur); return {done:t.done,total:t.total,pct:t.total?t.done/t.total:0,disc:dp.done}; }
function animateProgressDelta(pre){
  const root=$('#weekView'); if(!root||!pre) return;
  const t=totals(cur), dp=weekDiscProgress(cur), C=2*Math.PI*42, nowPct=t.total?t.done/t.total:0, ease='cubic-bezier(.4,0,.2,1)';
  const pctEl=root.querySelector('.ring-pct .pctnum'); if(pctEl) countUp(pctEl,Math.round(nowPct*100),{from:Math.round(pre.pct*100),dur:650});
  const doneEl=root.querySelector('.ring-sub .donenum'); if(doneEl) countUp(doneEl,t.done,{from:pre.done,dur:650});
  const arc=root.querySelector('.ring-c');
  if(arc){ const newOff=arc.getAttribute('stroke-dashoffset'); arc.style.transition='none'; arc.style.strokeDashoffset=(C*(1-pre.pct)).toFixed(1); arc.getBoundingClientRect(); requestAnimationFrame(()=>{ arc.style.transition='stroke-dashoffset .6s '+ease; arc.style.strokeDashoffset=newOff; }); }
  ['swim','ride','run'].forEach(key=>{
    const numEl=root.querySelector('.cup[data-disc="'+key+'"]'); if(numEl) countUp(numEl,dp.done[key],{from:pre.disc[key],dur:650});
    const bar=root.querySelector('.disc-bar i[data-disc="'+key+'"]');
    if(bar){ const newW=bar.style.width, pl=dp.plan[key]||0, oldW=(pl?Math.round(pre.disc[key]/pl*100):0)+'%'; bar.style.transition='none'; bar.style.width=oldW; bar.getBoundingClientRect(); requestAnimationFrame(()=>{ bar.style.transition='width .6s '+ease; bar.style.width=newW; }); }
  });
}
// 產生一個可滾動的數字 span（HTML 內已是最終值 → 不播放時直接正確；播放時由 introAnimate 從 0 滾上來）
function cup(v,dec,suf,pre){
  dec=dec||0; suf=suf||''; pre=pre||'';
  const txt=pre+(+v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
  return `<span class="cup" data-to="${v}" data-dec="${dec}" data-suf="${suf}" data-pre="${pre}">${txt}</span>`;
}
// render 後呼叫一次：卡片逐張進場（stagger）＋ 數字滾動
function introAnimate(sel){
  const root=$(sel); if(!root) return;
  root.querySelectorAll('.intro-card').forEach((el,i)=>{ el.style.animationDelay=(i*55)+'ms'; });
  root.querySelectorAll('.cup').forEach(el=>{ countUp(el,parseFloat(el.dataset.to)||0,{dec:+el.dataset.dec||0,suf:el.dataset.suf||'',pre:el.dataset.pre||''}); });
}
function renderProgress(w){

function weekDots(w){
  let s='';
  for(let di=0;di<7;di++){
    const sess=effectiveSessions(w,di).filter(x=>!x.rest&&!x.skip);
    const allDone=sess.length>0&&sess.every(x=>x.done);
    const some=sess.some(x=>x.done);
    const col=allDone?'background:var(--done)':some?'background:#bcdcc9':sess.length?'border:1.5px solid #d8dbe2':'background:#eceef1';
    s+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><i style="${col}"></i><span style="font-size:9px;font-weight:700;color:var(--faint)">${DAYS[di][0]}</span></div>`;
  }
  return s;
}

// 唯一關閉手勢＝往下拉（門檻 170px）；preventDefault 讓背景不跟著跑、只動 sheet 本身
(function(){
  const c=$('#sheet-card'); if(!c) return;
  let sy=0, dy=0, on=false;

function startSync(){

    if(doc.exists){const d=doc.data();checks=d.checks||{};bonus=d.bonus||{};weekMode=d.weekMode||{};sessionAdj=d.sessionAdj||{};suggestions=d.suggestions||[];saveLocal();render();}
    setSync('synced');
  },()=>setSync('offline'));
  _unsubActs=db.collection('tri_users').doc(currentUser.uid).collection('activities').orderBy('date','desc').onSnapshot(snap=>{
    acts=snap.docs.map(x=>{const d=x.data();let dt=d.date;if(dt&&dt.toDate)dt=dt.toDate().toISOString().slice(0,10);return {id:x.id,...d,date:dt};});render();

      $('#user-btn').innerHTML=u.photoURL?`<img src="${u.photoURL}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`:ini;
      $('#menu-name').textContent=u.displayName||'Signed in';$('#menu-email').textContent=u.email||'';
      enter();startSync();
    }else{currentUser=null;stopSync();$('#auth').style.display='flex';$('#auth').classList.remove('gone');$('#shell').classList.remove('on');}
  });
}else{
  $('#auth').classList.remove('loading');
  $('#mode-pill').textContent='Local preview';
  $('#signin-label').textContent='進入（預覽）';
  $('#auth-note').textContent='尚無 Firebase 設定 — 使用本機儲存。填 config + 部署即可雲端同步（見 SETUP.md）。';
  $('#btn-signin').onclick=enter;
}
</script>
</body>
</html>
